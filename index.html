<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitchou boutaztouza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="paw-pattern"></div>

    <header>
        <h1 class="main-title">Pitchou boutaztouza</h1>
        <nav class="top-nav">
            <button class="nav-btn active" onclick="showPage('missile')">missile</button>
            <button class="nav-btn" onclick="showPage('kassouli')">kassouli</button>
            <button class="nav-btn" onclick="showPage('faya7')">faya7</button>
            <button class="nav-btn" onclick="showPage('rir-rgad')">rir rgad</button>
        </nav>
    </header>

    <main class="content-container">
        <section id="missile" class="page-content active">
            <h2>missile</h2>
            <div class="image-wrapper">
                <img src="images/missile-pic.jpg" alt="Missile Picture">
            </div>
            <p>Content for the missile page goes here.</p>
        </section>

        <section id="kassouli" class="page-content">
            <h2>kassouli</h2>
            <div class="image-wrapper">
                <img src="images/kassouli-pic.jpg" alt="Kassouli Picture">
            </div>
            <p>Content for the kassouli page goes here.</p>
        </section>

        <section id="faya7" class="page-content">
            <h2>faya7</h2>
            <div class="image-wrapper">
                <img src="images/faya7-pic.jpg" alt="Faya7 Picture">
            </div>
            <p>Content for the faya7 page goes here.</p>
        </section>

        <section id="rir-rgad" class="page-content">
            <h2>rir rgad</h2>
            <div class="image-wrapper">
                <img src="images/rir-rgad-pic.jpg" alt="Rir Rgad Picture">
            </div>
            <p>Content for the rir rgad page goes here.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
